<section class="panel">
  <div class="section-head">
    <h2>How to read this</h2>
    <p>${intro_text}</p>
  </div>
  <div class="action-row">
    <a class="thread-chip" href="/">back to board index</a>
    <a class="thread-chip" href="/compose/task">compose a task thread</a>
    <a class="thread-chip" href="#priority-table">jump to priorities</a>
  </div>
  <div class="action-row">
    ${view_nav_html}
  </div>
  ${stats_html}
</section>

<section class="panel">
  <div class="section-head">
    <h2>${table_heading}</h2>
    <p>${table_text}</p>
  </div>
  <p id="task-sort-status" class="sr-only" aria-live="polite"></p>
  <div class="table-shell">
    <table class="priority-table" id="priority-table" data-sortable-table>
      <caption>Task threads with impact, implementation difficulty, dependencies, sources, and comment activity.</caption>
      <colgroup>
        <col class="col-task-id">
        <col class="col-task-main">
        <col class="col-impact">
        <col class="col-difficulty">
        <col class="col-dependencies">
        <col class="col-sources">
        <col class="col-comments">
      </colgroup>
      <thead>
        <tr>
          <th scope="col" aria-sort="none">
            <button class="sort-button" type="button" data-sort-key="id" data-sort-type="text">ID</button>
          </th>
          <th scope="col" aria-sort="none">
            <button class="sort-button" type="button" data-sort-key="task" data-sort-type="text">Task</button>
          </th>
          <th scope="col" aria-sort="none">
            <button class="sort-button" type="button" data-sort-key="impact" data-sort-type="number">Presentability impact</button>
          </th>
          <th scope="col" aria-sort="none">
            <button class="sort-button" type="button" data-sort-key="difficulty" data-sort-type="number">Implementation difficulty</button>
          </th>
          <th scope="col" aria-sort="none">
            <button class="sort-button" type="button" data-sort-key="dependencies" data-sort-type="text">Dependencies</button>
          </th>
          <th scope="col" aria-sort="none">
            <button class="sort-button" type="button" data-sort-key="source" data-sort-type="text">Sources</button>
          </th>
          <th scope="col" aria-sort="none">
            <button class="sort-button" type="button" data-sort-key="comments" data-sort-type="number">Comments</button>
          </th>
        </tr>
      </thead>
      <tbody>
        ${rows_html}
      </tbody>
    </table>
  </div>
</section>
