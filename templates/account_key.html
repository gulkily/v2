<section class="panel page-section">
  <div class="section-head page-lede">
    <h2>Key material</h2>
    <p>This page shows the browser-stored signing key available on this device.</p>
  </div>
</section>

<section class="panel compose-panel page-section">
  <p id="key-material-status" class="status-note">Checking browser key storage...</p>
  <div class="compose-grid">
    <section class="compose-card">
      <div class="action-row">
        <button id="generate-key-button" type="button">Generate New Key</button>
        <button id="import-key-button" type="button">Import Key</button>
      </div>
      <label class="field-stack" for="key-private-key-output">
        <span>ASCII-armored private key</span>
        <textarea id="key-private-key-output" class="technical-textarea" rows="10" spellcheck="false" wrap="off"></textarea>
      </label>
      <label class="field-stack" for="key-public-key-output">
        <span>ASCII-armored public key</span>
        <div class="copy-textarea-wrap copy-textarea-wrap--full">
          <button class="copy-textarea-button" type="button" data-copy-source="#key-public-key-output">copy</button>
          <textarea id="key-public-key-output" class="technical-textarea key-display profile-public-key-textarea" rows="8" spellcheck="false" wrap="off" readonly></textarea>
        </div>
      </label>
    </section>
  </div>
</section>
