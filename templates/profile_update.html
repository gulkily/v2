<section
  id="profile-update-app"
  class="panel compose-panel page-section"
  data-command="update_profile"
  data-endpoint="/api/update_profile"
  data-dry-run="${dry_run_value}"
  data-source-identity-id="${source_identity_id}"
  data-profile-slug="${profile_slug}"
>
  <form id="profile-update-form" class="field-stack">
    <label class="field-stack" for="display-name-input">
      <span>Choose a username:</span>
      <input id="display-name-input" name="display_name" type="text" maxlength="32" value="${display_name_value}" required>
    </label>
    <div class="action-row">
      <button id="sign-submit-button" type="submit">${submit_label}</button>
      <a class="thread-chip" href="/profiles/${profile_slug}">back to profile</a>
      <a class="thread-chip" href="/account/key/">view browser key</a>
    </div>
  </form>
  <div class="action-row">
    <button id="clear-pending-submission-button" type="button" hidden>Clear saved submission</button>
  </div>
  <p id="key-status" class="status-note">Checking browser signing support...</p>
  <p id="submit-status" class="status-note">Waiting for submission.</p>
</section>

<details class="panel compose-details page-section">
  <summary>Technical details</summary>
  <div class="detail-grid">
    <div class="detail-row"><strong class="detail-label">Current display name:</strong><code class="detail-value">${current_display_name}</code></div>
    <div class="detail-row"><strong class="detail-label">Resolved Identity-ID:</strong><code class="detail-value detail-value--truncate">${identity_id}</code></div>
    <div class="detail-row"><strong class="detail-label">Display-name source:</strong><code class="detail-value">${display_name_source}</code></div>
  </div>
  <div class="compose-grid">
    <section class="compose-card">
      <div class="section-head page-lede">
        <h2>Key material</h2>
      </div>
      <div class="action-row">
        <button id="generate-key-button" type="button">Generate New Key</button>
        <button id="import-key-button" type="button">Import Key</button>
      </div>
      <label class="field-stack" for="private-key-input">
        <span>ASCII-armored private key</span>
        <textarea id="private-key-input" class="technical-textarea" rows="10" spellcheck="false" wrap="off"></textarea>
      </label>
      <label class="field-stack" for="public-key-output">
        <span>ASCII-armored public key</span>
        <div class="copy-textarea-wrap copy-textarea-wrap--full">
          <button class="copy-textarea-button" type="button" data-copy-source="#public-key-output">copy</button>
          <textarea id="public-key-output" class="technical-textarea key-display profile-public-key-textarea" rows="8" spellcheck="false" wrap="off" readonly></textarea>
        </div>
      </label>
    </section>

    <section class="compose-card">
      <div class="section-head page-lede">
        <h2>Derived payload</h2>
      </div>
      <label class="field-stack" for="payload-output">
        <span>Canonical payload preview</span>
        <textarea id="payload-output" class="technical-textarea" rows="10" spellcheck="false" wrap="off" readonly></textarea>
      </label>
      <label class="field-stack" for="signature-output">
        <span>Detached signature</span>
        <textarea id="signature-output" class="technical-textarea" rows="8" spellcheck="false" wrap="off" readonly></textarea>
      </label>
      <label class="field-stack" for="response-output">
        <span>Server response</span>
        <textarea id="response-output" class="technical-textarea" rows="10" spellcheck="false" wrap="off" readonly></textarea>
      </label>
    </section>
  </div>
</details>
